# configuracao do bd
quarkus.datasource.db-kind = postgresql
quarkus.datasource.username = {$DB_USER}
quarkus.datasource.password = {$DB_SENHA}
quarkus.datasource.jdbc.url = {DB-URL}

# desabilitar o docker
quarkus.devservices.enabled=false

quarkus.hibernate-orm.database.generation=drop-and-create
# quarkus.hibernate-orm.database.generation=none
# quarkus.hibernate-orm.database.generation=update

quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.log.bind-parameters=true

# Keycloak OIDC - resource server (valida tokens emitidos pelo Keycloak)
quarkus.oidc.application-type=service
quarkus.oidc.auth-server-url=FILL_IN_FROM_KEYCLOAK_CONSOLE
quarkus.oidc.client-id=FILL_IN_FROM_KEYCLOAK_CONSOLE
quarkus.oidc.credentials.secret=FILL_IN_FROM_KEYCLOAK_CONSOLE
quarkus.oidc.roles.role-claim-path=realm_access/roles

# Keycloak Admin Client - operacoes administrativas (ex: resetar senha)
keycloak.admin.server-url=FILL_IN_FROM_KEYCLOAK_CONSOLE
keycloak.admin.realm=master
keycloak.admin.client-id=admin-cli
keycloak.admin.username=FILL_IN_FROM_KEYCLOAK_CONSOLE
keycloak.admin.password=FILL_IN_FROM_KEYCLOAK_CONSOLE
keycloak.admin.target-realm=FILL_IN_FROM_KEYCLOAK_CONSOLE

# REST Client - endpoint de token do Keycloak (utilizado no login)
quarkus.rest-client.keycloak-token.url=FILL_IN_FROM_KEYCLOAK_CONSOLE

# REST Client - Admin REST API do Keycloak (utilizado no esqueci a senha)
quarkus.rest-client.keycloak-admin.url=FILL_IN_FROM_KEYCLOAK_CONSOLE
